[alembic]
script_location = alembic
prepend_sys_path = .
# No sqlalchemy.url here: configparser %(...)s interpolation cannot read env
# vars (a literal %(SOMNUS_DB_PATH)s crashes ini parsing — issue #68).
# alembic/env.py derives the URL from backend.config.settings, which honors
# SOMNUS_DB_PATH.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv and pip downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'Makefile') }}
          restore-keys: ${{ runner.os }}-uv-${{ matrix.python-version }}-

      # Install recipe lives once in the Makefile (pinned uv); the T-13
      # release-age cooldown is committed in pyproject.toml [tool.uv.pip],
      # so CI runs exactly what contributors run.
      - name: Install dependencies (make setup-backend, T-13 cooldown)
        run: make setup-backend

      - name: Lint (ruff)
        run: ruff check backend

      - name: Format check (ruff)
        run: ruff format --check backend

      - name: Type check (mypy)
        run: mypy backend --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r backend -x backend/tests -q

      - name: Dependency audit (pip-audit)
        run: pip-audit

      - name: Tests
        run: pytest --cov-report=xml

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Pinned (T-13): a floating range would pull a fresh npm with no cooldown.
      # npm >= 11.10 satisfies the engines/engine-strict floor `npm ci` checks,
      # and will honor min-release-age if `npm audit fix`/`npm update` is added.
      - name: Upgrade npm (pinned; engines floor requires >= 11.10)
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Tests
        working-directory: frontend
        run: npm test

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gitleaks scans all commits and errors on shallow clones
          fetch-depth: 0

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

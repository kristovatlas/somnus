name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies (uv, with T-13 release-age cooldown)
        env:
          UV_EXCLUDE_NEWER: "7 days"
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check backend

      - name: Format check (ruff)
        run: ruff format --check backend

      - name: Type check (mypy)
        run: mypy backend --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r backend -x backend/tests -q

      - name: Dependency audit (pip-audit)
        run: pip-audit

      - name: Tests
        run: pytest --cov-report=xml

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm (T-13 min-release-age needs npm >= 11.10)
        run: npm install -g npm@^11.10

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Tests
        working-directory: frontend
        run: npm test

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gitleaks scans all commits and errors on shallow clones
          fetch-depth: 0

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

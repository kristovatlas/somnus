name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv and pip downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'Makefile') }}
          restore-keys: ${{ runner.os }}-uv-${{ matrix.python-version }}-

      # Install recipe lives once in the Makefile (pinned uv); the T-13
      # release-age cooldown is committed in pyproject.toml [tool.uv.pip],
      # so CI runs exactly what contributors run.
      - name: Install dependencies (make setup-backend, T-13 cooldown)
        run: make setup-backend

      - name: Lint (ruff)
        run: ruff check backend

      - name: Format check (ruff)
        run: ruff format --check backend

      - name: Type check (mypy)
        run: mypy backend --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r backend -x backend/tests -q

      - name: Dependency audit (pip-audit)
        run: pip-audit

      - name: Tests
        run: pytest --cov-report=xml

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Pinned (T-13): a floating range would pull a fresh npm with no cooldown.
      # npm >= 11.10 satisfies the engines/engine-strict floor `npm ci` checks,
      # and will honor min-release-age if `npm audit fix`/`npm update` is added.
      - name: Upgrade npm (pinned; engines floor requires >= 11.10)
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # T-13 (docs/THREAT_MODEL.md): fail the build on a known-vulnerable
      # runtime dependency. Scoped to production deps (--omit=dev) — those are
      # what ship to the user's browser; build-tool dev deps are covered by the
      # install cooldown + Socket. Gated at high+critical so an unfixable
      # low/moderate advisory can't wedge every PR.
      - name: Dependency audit (npm, production deps)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Tests
        working-directory: frontend
        run: npm test

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history: gitleaks scans all commits and errors on shallow clones
          fetch-depth: 0

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
